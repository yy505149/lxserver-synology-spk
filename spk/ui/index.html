<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LX Server 配置</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        height: 100%;
        overflow: hidden;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #fff;
      }
      .overlay {
        height: 100%;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        padding: 0;
        box-sizing: border-box;
      }
      .dialog {
        width: 100%;
        height: 100%;
        max-width: 100%;
        background: #fff;
        color: #111;
        border-radius: 0;
        box-shadow: none;
        padding: 20px 22px 18px;
        box-sizing: border-box;
      }
      .title { margin: 0 0 10px; font-size: 20px; }
      .hint { margin: 0 0 16px; color: #666; font-size: 13px; }
      .row { margin: 10px 0; display: flex; align-items: center; }
      label { width: 140px; flex: 0 0 140px; }
      input, select { flex: 1; min-width: 0; padding: 7px; border: 1px solid #bbb; border-radius: 6px; }
      .switch-row input[type="checkbox"] { width: auto; flex: 0 0 auto; margin-right: 8px; }
      .switch-row label { width: auto; flex: 1; }
      .actions { margin-top: 16px; display: flex; gap: 8px; }
      button { padding: 8px 14px; border: 0; border-radius: 6px; cursor: pointer; }
      #saveBtn { background: #0b63d9; color: #fff; }
      #updateBtn { background: #147d4a; color: #fff; }
      #msg { margin-top: 12px; color: #1b5e20; white-space: pre-wrap; font-size: 13px; }
      #err { margin-top: 12px; color: #b71c1c; white-space: pre-wrap; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="dialog">
        <h2 class="title">LX Server 配置</h2>
        <p class="hint">修改后会自动重启服务并立即生效。</p>
        <div class="row">
          <label for="port">服务端口</label>
          <input id="port" type="number" min="1" max="65535" value="" placeholder="读取中..." />
        </div>
    <div class="row">
      <label>监听地址</label>
      <input value="IPv6/双栈 (::)" disabled />
    </div>
        <div class="row">
          <label for="password">管理密码</label>
          <input id="newPassword" type="password" placeholder="留空则不修改" />
        </div>
        <div class="row switch-row">
          <input id="defaultSourceEnabled" type="checkbox" checked />
          <label for="defaultSourceEnabled">启用默认自定义源（musicapi.js）</label>
        </div>
        <div class="row switch-row">
          <input id="autoUpdateEnabled" type="checkbox" checked />
          <label for="autoUpdateEnabled">启用默认源自动更新（按定期间隔）</label>
        </div>
        <div class="actions">
          <button id="saveBtn">保存并生效</button>
          <button id="updateBtn">立即检查并更新默认源</button>
        </div>
        <div id="msg"></div>
        <div id="err"></div>
      </div>
    </div>
    <script>
      const saveBtn = document.getElementById("saveBtn");
      const msg = document.getElementById("msg");
      const err = document.getElementById("err");
      const portEl = document.getElementById("port");
      const defaultSourceEnabledEl = document.getElementById("defaultSourceEnabled");
      const autoUpdateEnabledEl = document.getElementById("autoUpdateEnabled");
      const updateBtn = document.getElementById("updateBtn");

      (async () => {
        try {
          const res = await fetch("./apply.cgi", { method: "GET", credentials: "include" });
          const text = await res.text();
          let data = {};
          try { data = JSON.parse(text); } catch {}
          if (res.ok && data && data.success && data.port) {
            portEl.value = String(data.port);
            defaultSourceEnabledEl.checked = String(data.default_source_enabled || "1") === "1";
            autoUpdateEnabledEl.checked = String(data.source_auto_update_enabled || "1") === "1";
          } else if (!portEl.value) {
            portEl.value = "9527";
          }
        } catch {
          if (!portEl.value) portEl.value = "9527";
        }
      })();

      saveBtn.addEventListener("click", async () => {
        err.textContent = "";
        msg.textContent = "";
        const port = portEl.value.trim();
        const newPassword = document.getElementById("newPassword").value;
        const pNum = Number(port);
        if (!Number.isInteger(pNum) || pNum < 1 || pNum > 65535) {
          err.textContent = "端口必须是 1-65535 的整数。";
          return;
        }
        saveBtn.disabled = true;
        try {
          const body = new URLSearchParams();
          body.set("port", port);
          body.set("bind_ip", "::");
          body.set("default_source_enabled", defaultSourceEnabledEl.checked ? "1" : "0");
          body.set("source_auto_update_enabled", autoUpdateEnabledEl.checked ? "1" : "0");
          if (newPassword) body.set("password", newPassword);
          const res = await fetch("./apply.cgi", {
            method: "POST",
            credentials: "include",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
            },
            body: body.toString(),
          });
          const text = await res.text();
          let data = {};
          try { data = JSON.parse(text); } catch {}
          if (!res.ok || !data.success) {
            throw new Error((data && data.error) || ("请求失败: HTTP " + res.status));
          }
          msg.textContent =
            "配置已保存，套件已请求重启。";
          setTimeout(() => {
            try {
              window.parent.postMessage({ type: "LXSERVER_CLOSE" }, "*");
            } catch {}
          }, 300);
        } catch (e) {
          err.textContent = e.message || String(e);
        } finally {
          saveBtn.disabled = false;
        }
      });

      updateBtn.addEventListener("click", async () => {
        err.textContent = "";
        msg.textContent = "";
        saveBtn.disabled = true;
        updateBtn.disabled = true;
        try {
          const body = new URLSearchParams();
          body.set("action", "update_source");
          const res = await fetch("./apply.cgi", {
            method: "POST",
            credentials: "include",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
            },
            body: body.toString(),
          });
          const text = await res.text();
          let data = {};
          try { data = JSON.parse(text); } catch {}
          if (!res.ok || !data.success) {
            throw new Error((data && data.error) || ("请求失败: HTTP " + res.status));
          }
          msg.textContent = "已触发默认源更新并重启服务，请稍后刷新页面查看效果。";
        } catch (e) {
          err.textContent = e.message || String(e);
        } finally {
          saveBtn.disabled = false;
          updateBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
